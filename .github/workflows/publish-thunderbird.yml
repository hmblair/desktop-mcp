name: Publish thunderbird-mcp

on:
  release:
    types: [published]

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'thunderbird-mcp@')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install
      - run: npm run build -w packages/shared
      - run: npm run build -w packages/thunderbird
      - run: npm run test -w packages/thunderbird
      - name: Publish
        run: npm publish -w packages/thunderbird --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
